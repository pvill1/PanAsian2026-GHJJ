<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Tracker · Pan Asian 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10; --surface:#12151b; --surface2:#1a1e27;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0f2f7; --muted:#6b7280; --accent:#e8ff47;
  --blue:#4fa3ff; --red:#ff6b6b; --green:#4ade80; --orange:#fb923c; --purple:#c084fc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(232,255,71,0.04) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 10% 80%,rgba(79,163,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 60px;}

header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;}
.event-name{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:0.92;letter-spacing:1px;}
.event-name span{color:var(--accent);}
.event-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:right;line-height:1.6;margin-top:4px;}
.team-badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--surface2);border:1px solid var(--border2);padding:5px 12px;border-radius:999px;font-size:12px;font-weight:500;color:var(--muted);}
.team-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--muted);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s;}
.sync-dot.live{background:var(--green);animation:blink 1.5s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

.setup-wrap{margin-bottom:20px;}
.setup-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:16px 18px;}
.setup-row{display:flex;gap:8px;}
.setup-select{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.setup-select option{background:var(--surface2);}
.btn-track{background:var(--accent);color:#0a0c10;border:none;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
.btn-track:hover{opacity:0.85;}
.btn-track:disabled{opacity:0.5;cursor:default;}

.next-wrap{margin-bottom:20px;}
.next-card{background:linear-gradient(135deg,#1a2010 0%,#141a0d 100%);border:1px solid rgba(232,255,71,0.2);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;}
.next-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(232,255,71,0.12),transparent 70%);pointer-events:none;}
.next-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--accent);text-transform:uppercase;margin-bottom:6px;}
.next-name{font-size:20px;font-weight:600;color:var(--text);margin-bottom:2px;}
.next-sub{font-size:12px;color:rgba(232,255,71,0.5);margin-bottom:14px;}
.countdown-row{display:flex;gap:8px;}
.cd-unit{background:rgba(0,0,0,0.3);border:1px solid rgba(232,255,71,0.15);border-radius:10px;padding:8px 12px;text-align:center;min-width:54px;}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1;}
.cd-label{font-size:9px;color:rgba(232,255,71,0.4);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px;}
.all-done{font-size:16px;font-weight:500;color:var(--accent);padding:4px 0;}
.ready-banner{display:none;align-items:center;gap:8px;background:rgba(232,255,71,0.1);border:1px solid rgba(232,255,71,0.3);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:13px;font-weight:500;color:var(--accent);}
.ready-banner.show{display:flex;}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.pill{font-size:12px;font-weight:500;padding:6px 14px;border-radius:999px;border:1px solid var(--border2);background:var(--surface);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;}
.pill.active{background:var(--accent);color:#0a0c10;border-color:var(--accent);font-weight:600;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:border-color 0.2s,opacity 0.3s;}
.card.is-next{border-color:rgba(232,255,71,0.35);background:#13160e;}
.card.is-past{opacity:0.45;}
.card.is-live{border-color:rgba(251,146,60,0.45);background:#161007;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.fighter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px;}
.fighter-name{font-size:17px;font-weight:600;color:var(--text);}
.fighter-nick{font-size:11px;color:var(--muted);margin-left:2px;}
.next-badge{font-size:9px;font-weight:600;background:var(--accent);color:#0a0c10;padding:2px 7px;border-radius:999px;letter-spacing:0.05em;}
.live-badge{font-size:9px;font-weight:600;background:rgba(251,146,60,0.2);color:var(--orange);padding:2px 7px;border-radius:999px;}
.time-col{text-align:right;flex-shrink:0;margin-left:8px;}
.start-time{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--blue);line-height:1;}
.start-time.past{color:var(--muted);}
.match-cd{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.match-cd.soon{color:var(--accent);}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;letter-spacing:0.04em;text-transform:uppercase;}
.tag-mat{background:rgba(79,163,255,0.12);color:var(--blue);}
.tag-round{background:rgba(192,132,252,0.12);color:var(--purple);}
.tag-done{background:rgba(255,255,255,0.05);color:var(--muted);}
.tag-live{background:rgba(251,146,60,0.15);color:var(--orange);}
.divider{height:1px;background:var(--border);margin-bottom:10px;}
.group-label{font-size:11px;color:var(--muted);margin-bottom:10px;}
.vs-row{font-size:13px;color:var(--muted);margin-bottom:2px;}
.vs-row strong{color:var(--text);font-weight:500;}
.club-row{font-size:11px;color:var(--muted);}
.result-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.result-summary{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;}
.win-summary{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
.lose-summary{background:rgba(255,107,107,0.1);color:var(--red);border:1px solid rgba(255,107,107,0.2);}

.loading-row{text-align:center;padding:30px 16px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row p{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
.error-msg{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--red);margin-bottom:14px;display:none;}
.section-sep{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;padding:6px 0 8px;}
.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="header-top">
      <div class="event-name">PAN<br><span>ASIAN</span><br><span style="font-size:28px;letter-spacing:2px;">2026</span></div>
      <div class="event-date">JUN 13, 2026<br>MANILA, PH</div>
    </div>
    <div class="team-badge">14 athletes &middot; Kamphuis Fabricio</div>
    <div class="sync-row">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Not started</span>
    </div>
  </header>

  <div class="setup-wrap">
    <div class="setup-card">
      <div class="setup-row">
        <select class="setup-select" id="mat-filter"><option value="">All mats</option></select>
        <button class="btn-track" id="btn-track" onclick="startTracking()">Track &#8599;</button>
      </div>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="next-wrap" id="next-wrap" style="display:none;">
    <div class="next-card">
      <div class="next-eyebrow">&#9654; Next match</div>
      <div class="next-name" id="nc-name">&mdash;</div>
      <div class="next-sub" id="nc-sub"></div>
      <div class="countdown-row" id="nc-countdown">
        <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-label">hrs</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-label">min</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-label">sec</div></div>
      </div>
      <div class="ready-banner" id="ready-banner">
        <div class="pulse"></div>
        <span id="ready-text">Head to the mat now!</span>
      </div>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div id="cards"></div>
</div>

<script>
var BASE  = 'https://bjjfphilippines.smoothcomp.com';
var EVENT = '31193';

var ROSTER = [
  {full:'Odinn Zachary Villarosa',  nick:'Odinn'  },
  {full:'Joaquin Matteus Bulatao',  nick:'Aki'    },
  {full:'Mikel Dominic Villarosa',  nick:'Mikel'  },
  {full:'Inigo Alfonso Villarosa',  nick:'Inigo'  },
  {full:'Stephen John Lao',         nick:'Stephen'},
  {full:'Zion Amir Regudo',         nick:'Zion'   },
  {full:'Antonio Samuel Distajo',   nick:'Antonio'},
  {full:'Francis Marcelino',        nick:'Francis'},
  {full:'Zachary Amber Regudo',     nick:'Amber'  },
  {full:'Dondon Cenir',             nick:'Dondon' },
  {full:'Marion Noel Manucom',      nick:'Ion'    },
  {full:'Mitchelle Ian Nadres',     nick:'Ian'    },
  {full:'Summer Nadres',            nick:'Summer' },
  {full:'Mikyla Noelle Manucom',    nick:'Kaylla' }
];

var ROSTER_NORM = ROSTER.map(function(r){
  return r.full.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();
});

function normName(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();
}

function seatInRoster(name){
  var n = normName(name);
  for(var i=0;i<ROSTER_NORM.length;i++){
    var r=ROSTER_NORM[i];
    if(n===r) return ROSTER[i];
    var rW=r.split(' '), nW=n.split(' ');
    if(rW.length>=2 && nW.length>=2 && rW[0]===nW[0] && rW[rW.length-1]===nW[nW.length-1]) return ROSTER[i];
    if(r.length>4 && n.indexOf(r)>=0) return ROSTER[i];
    if(n.length>4 && r.indexOf(n)>=0) return ROSTER[i];
  }
  return null;
}

var teamMatches=[], curFilter='all', cdTimer=null;

function p2(n){return n<10?'0'+n:''+n;}
function fmtTime(iso){
  if(!iso) return '\u2014';
  var d=new Date(iso);
  return isNaN(d)?'\u2014':d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmtCd(ms){
  if(ms<=0) return null;
  var t=Math.floor(ms/1000);
  return{h:Math.floor(t/3600),m:Math.floor((t%3600)/60),s:t%60};
}
function validDate(iso){
  if(!iso) return null;
  var d=new Date(iso);
  return isNaN(d)?null:d;
}
function matchState(m){
  if(m.state==='started'||m.time_passed) return 'live';
  var real=(m.seats||[]).filter(function(s){return s.type==='registration';});
  var hasWinner=m.wonBy||real.some(function(s){return s.isWinner;});
  if(m.state==='finished'&&hasWinner) return 'done';
  return 'upcoming';
}
function ge(id){return document.getElementById(id);}
function st(id,v){var e=ge(id);if(e)e.textContent=v;}
function sh(id,v){var e=ge(id);if(e)e.innerHTML=v;}
function setSync(state,label){
  var d=ge('sync-dot');
  if(d) d.className='sync-dot'+(state==='live'?' live':state==='error'?' error':'');
  st('sync-label',label);
}
function showError(msg){
  var e=ge('error-msg');
  if(e){e.textContent=msg;e.style.display=msg?'block':'none';}
}

async function fetchBrackets(){
  var r=await fetch(BASE+'/en/event/'+EVENT+'/schedule/brackets.json');
  if(!r.ok) throw new Error('brackets.json '+r.status);
  return (await r.json()).brackets||[];
}
async function fetchBracket(bracketId){
  var r=await fetch(BASE+'/en/event/'+EVENT+'/schedule/new/bracket.json/'+bracketId);
  if(!r.ok) return [];
  return (await r.json()).matches||[];
}
async function fetchInBatches(brackets){
  var BATCH=10, DELAY=200, results=[];
  for(var i=0;i<brackets.length;i+=BATCH){
    var batch=brackets.slice(i,i+BATCH);
    var res=await Promise.all(batch.map(function(b){return fetchBracket(b.bracket_id);}));
    results=results.concat(res);
    if(i+BATCH<brackets.length) await new Promise(function(r){setTimeout(r,DELAY);});
  }
  return results;
}

async function load(){
  showError('');
  setSync('','Fetching\u2026');
  ge('cards').innerHTML='<div class="loading-row"><div class="spinner"></div><p>Scanning brackets\u2026</p></div>';
  try{
    var brackets=await fetchBrackets();

    /* Populate mat filter */
    var matMap={}, matsSeen={};
    brackets.forEach(function(b){
      matMap[b.bracket_id]=b.mats||'';
      if(b.mats) matsSeen[b.mats]=1;
    });
    var sel=ge('mat-filter');
    if(sel){
      var cur=sel.value;
      sel.innerHTML='<option value="">All mats</option>';
      Object.keys(matsSeen).sort().forEach(function(m){
        var o=document.createElement('option');
        o.value=m; o.textContent=m;
        if(m===cur) o.selected=true;
        sel.appendChild(o);
      });
    }

    /* Filter by mat selection */
    var matFilter=sel?sel.value:'';
    var filtered=matFilter?brackets.filter(function(b){return b.mats===matFilter;}):brackets;

    /* Batched fetch */
    var allArrays=await fetchInBatches(filtered);

    var found=[];
    allArrays.forEach(function(matches){
      (matches||[]).forEach(function(match){
        match._mat=matMap[match.bracket_id]||'';
        var seats=match.seats||[];
        var real=seats.filter(function(s){return s.type==='registration';});
        var hasOurs=real.some(function(s){return seatInRoster(s.name);});
        var bye=real.length<2&&seats.filter(function(s){return s.type==='tbd';}).length===0;
        if(hasOurs&&!bye) found.push(match);
      });
    });

    found.sort(function(a,b){
      var da=validDate(a.estimated_start), db=validDate(b.estimated_start);
      if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
      return da-db;
    });

    teamMatches=found;
    ge('next-wrap').style.display='block';
    buildFilters();
    render();
    updateNext();
    if(!cdTimer) cdTimer=setInterval(updateNext,1000);
    setSync('live','Live \u2014 '+new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}));

    /* After first load, change button to Refresh */
    var btn=ge('btn-track');
    if(btn){btn.disabled=false;btn.textContent='Refresh \u21ba';}

  }catch(e){
    showError('Could not load data. ('+e.message+')');
    setSync('error','Error');
    ge('cards').innerHTML='';
    var btn=ge('btn-track');
    if(btn){btn.disabled=false;btn.textContent='Retry \u2197';}
  }
}

function buildFilters(){
  var seen={};
  teamMatches.forEach(function(m){
    (m.seats||[]).forEach(function(s){
      var e=s.type==='registration'&&seatInRoster(s.name);
      if(e) seen[e.nick]=1;
    });
  });
  var nicks=Object.keys(seen).sort(function(a,b){
    return ROSTER.findIndex(function(r){return r.nick===a;})-
           ROSTER.findIndex(function(r){return r.nick===b;});
  });
  if(curFilter!=='all'&&!seen[curFilter]) curFilter='all';
  var pills='<button class="pill'+(curFilter==='all'?' active':'')+'" onclick="doFilter(\'all\')">All</button>';
  nicks.forEach(function(nick){
    pills+='<button class="pill'+(curFilter===nick?' active':'')+'" onclick="doFilter(\''+nick+'\')">'+nick+'</button>';
  });
  ge('filters').innerHTML=pills;
}

window.doFilter=function(key){
  curFilter=key;
  document.querySelectorAll('.pill').forEach(function(p){
    p.classList.toggle('active',p.textContent===key||(key==='all'&&p.textContent==='All'));
  });
  render();
};

function updateNext(){
  var now=new Date(), next=null;
  for(var i=0;i<teamMatches.length;i++){
    var m=teamMatches[i], s=matchState(m);
    if(s==='live'){next=m;break;}
    var d=validDate(m.estimated_start);
    if(s==='upcoming'&&d&&d>now){next=next||m;}
  }
  if(!next){
    st('nc-name',teamMatches.length?'All done!':'—');
    st('nc-sub', teamMatches.length?'Great job, team! \uD83E\uDD4B':'');
    sh('nc-countdown',teamMatches.length?'<div class="all-done">Done for the day!</div>':'');
    var rb=ge('ready-banner'); if(rb) rb.classList.remove('show');
    return;
  }
  var ourSeat=(next.seats||[]).find(function(s){return s.type==='registration'&&seatInRoster(s.name);});
  var entry=ourSeat?seatInRoster(ourSeat.name):null;
  var nick=entry?entry.nick:(ourSeat?ourSeat.name:'Team');
  var mat=next.mat_match_nr||next._mat||'';
  st('nc-name',nick+' \u2014 '+(next.group||''));
  st('nc-sub', mat+(next.estimated_start?' \u00b7 '+fmtTime(next.estimated_start):''));
  var d=validDate(next.estimated_start), banner=ge('ready-banner');
  if(d){
    var diff=d-now, cd=fmtCd(diff);
    if(cd){
      st('cd-h',p2(cd.h)); st('cd-m',p2(cd.m)); st('cd-s',p2(cd.s));
      if(banner){
        if(cd.h===0&&cd.m<15){banner.classList.add('show');st('ready-text',nick+' \u2014 head to '+mat+' now!');}
        else banner.classList.remove('show');
      }
    } else {
      sh('nc-countdown','<div class="all-done">Starting now!</div>');
      if(banner){banner.classList.add('show');st('ready-text',nick+' \u2014 head to '+mat+' now!');}
    }
  } else {
    st('cd-h','--'); st('cd-m','--'); st('cd-s','--');
    if(banner) banner.classList.remove('show');
  }
}

function render(){
  var list=teamMatches.filter(function(m){
    if(curFilter==='all') return true;
    return (m.seats||[]).some(function(s){
      var e=s.type==='registration'&&seatInRoster(s.name);
      return e&&e.nick===curFilter;
    });
  });
  if(!list.length){ge('cards').innerHTML='<div class="empty">No matches found.</div>';return;}
  var live=[],upcoming=[],done=[];
  list.forEach(function(m){
    var s=matchState(m);
    if(s==='live') live.push(m);
    else if(s==='done') done.push(m);
    else upcoming.push(m);
  });
  var html='';
  if(live.length)    {html+='<div class="section-sep">\uD83D\uDFE0 In progress</div>';    live.forEach(function(m){html+=mkcard(m,true,'live');});}
  if(upcoming.length){html+='<div class="section-sep">\u23F3 Upcoming</div>';             upcoming.forEach(function(m,i){html+=mkcard(m,!live.length&&i===0,'upcoming');});}
  if(done.length)    {html+='<div class="section-sep">\u2713 Completed</div>';            done.forEach(function(m){html+=mkcard(m,false,'done');});}
  ge('cards').innerHTML=html;
}

function mkcard(match,isNext,state){
  var seats=match.seats||[], now=new Date();
  var startD=validDate(match.estimated_start), past=startD&&startD<now;
  var ourSeats=seats.filter(function(s){return s.type==='registration'&& seatInRoster(s.name);});
  var oppSeats=seats.filter(function(s){return s.type==='registration'&&!seatInRoster(s.name);});
  var tbdSeats=seats.filter(function(s){return s.type==='tbd';});

  var cls='card'+(state==='live'?' is-live':isNext?' is-next':(state==='done'||past)?' is-past':'');

  var fighterRows=ourSeats.map(function(s){
    var e=seatInRoster(s.name);
    var badge=state==='live'?'<span class="live-badge">LIVE</span>':isNext?'<span class="next-badge">NEXT</span>':'';
    return '<div class="fighter-row"><div class="fighter-name">'+(e?e.nick:s.name)+'</div>'+'<span class="fighter-nick">'+s.name+'</span>'+badge+'</div>';
  }).join('');

  var timeStr=fmtTime(match.estimated_start), cdTxt='';
  if(state==='upcoming'&&startD){
    var diff=startD-now, cd=fmtCd(diff);
    if(cd) cdTxt='<div class="match-cd'+(cd.h===0&&cd.m<30?' soon':'')+'">'+(cd.h>0?cd.h+'h ':'')+cd.m+'m away</div>';
  } else if(state==='live') cdTxt='<div class="match-cd soon">Now</div>';
  else if(state==='done')   cdTxt='<div class="match-cd">Done</div>';

  var matTag  =match.mat_match_nr?'<span class="tag tag-mat">Match #'+match.mat_match_nr+'</span>':match._mat?'<span class="tag tag-mat">'+match._mat+'</span>':'';
  var roundTag=match.name?'<span class="tag tag-round">'+match.name+'</span>':(match.round?'<span class="tag tag-round">Rd '+match.round+'</span>':'');
  var stateTag=state==='live'?'<span class="tag tag-live">Live</span>':state==='done'?'<span class="tag tag-done">Finished</span>':'';

  var vsHtml='';
  if(oppSeats.length){
    vsHtml=oppSeats.map(function(s){
      return '<div class="vs-row"><span style="color:var(--muted);font-size:11px;margin-right:4px;">vs</span><strong>'+s.name+'</strong></div><div class="club-row">'+(s.club||s.affiliation||'\u2014')+'</div>';
    }).join('');
  } else if(tbdSeats.length){
    vsHtml='<div class="vs-row" style="font-style:italic;color:var(--muted)">'+(tbdSeats[0].name||'TBD')+'</div>';
  } else {
    vsHtml='<div class="vs-row" style="font-style:italic;color:var(--muted)">Opponent TBD</div>';
  }

  var rs='';
  if(state==='done'){
    var winSeat=seats.find(function(s){return s.isWinner;});
    if(winSeat){
      var ourWin=!!seatInRoster(winSeat.name);
      var wonByTxt=match.wonBy?' by '+match.wonBy:'';
      rs='<div class="result-section"><div class="result-summary '+(ourWin?'win-summary':'lose-summary')+'">'+(ourWin?'\uD83C\uDFC6 WIN':'\uD83D\uDCAA LOSS')+wonByTxt+'</div></div>';
    }
  }

  var grp=match.group?'<div class="group-label">'+match.group+'</div>':'';
  return '<div class="'+cls+'"><div class="card-header"><div>'+fighterRows+'</div>'+
    '<div class="time-col"><div class="start-time'+(past?' past':'')+'">'+timeStr+'</div>'+cdTxt+'</div></div>'+
    '<div class="tags">'+matTag+roundTag+stateTag+'</div>'+
    grp+'<div class="divider"></div>'+vsHtml+rs+'</div>';
}

window.startTracking=function(){
  var btn=ge('btn-track');
  if(btn){btn.disabled=true;btn.textContent='Loading\u2026';}
  load();
};
</script>
</body>
</html>
